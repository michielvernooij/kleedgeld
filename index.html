<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Kleedgeld</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
    body{padding:env(safe-area-inset-top,20px) 16px env(safe-area-inset-bottom,34px)}
    .screen{display:none;min-height:100vh}
    .screen.active{display:block}
    .row{display:flex;gap:10px;align-items:center}
    .rowb{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .card{background:#161616;border:1px solid #2a2a2a;border-radius:18px;padding:18px;margin-bottom:14px}
    .metric{background:#111;border-radius:12px;padding:14px;text-align:center;flex:1}
    .tabs{display:flex;gap:0;background:#111;border-radius:12px;padding:3px;margin-bottom:20px}
    .tab{flex:1;padding:10px 4px;font-size:12px;border-radius:10px;cursor:pointer;background:transparent;color:#666;border:none;font-weight:600}
    .tab.active{background:#1e1e1e;color:#fff}
    .btn-primary{background:#fff;color:#000;border:none;border-radius:14px;padding:15px 20px;font-size:16px;font-weight:700;cursor:pointer;width:100%}
    .btn-ghost{background:transparent;border:1px solid #333;border-radius:12px;padding:11px 16px;font-size:14px;color:#fff;cursor:pointer}
    .btn-danger{background:transparent;border:1px solid #7f1d1d;color:#fca5a5;border-radius:12px;padding:11px 16px;font-size:14px;cursor:pointer}
    .btn-sm{padding:8px 12px;font-size:12px;border-radius:10px}
    .back-btn{background:none;border:none;color:#777;font-size:15px;cursor:pointer;padding:6px 0 20px 0}
    .fg{margin-bottom:18px}
    label{font-size:12px;color:#666;letter-spacing:.06em;text-transform:uppercase;font-weight:600;display:block;margin-bottom:6px}
    input,select{width:100%;padding:14px 16px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;font-size:16px;color:#fff;outline:none}
    input:focus{border-color:#555}
    .av,.av-lg,.av-sm{border-radius:50%;object-fit:cover;object-position:center top;display:block;background:#222}
    .av{width:52px;height:52px;border:2px solid #333}
    .av-lg{width:68px;height:68px;border:3px solid #444}
    .av-sm{width:34px;height:34px;border:1px solid #333}
    .saldo-num{font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1}
    .badge-paid{background:#14291a;color:#4ade80;font-size:12px;padding:4px 12px;border-radius:20px;font-weight:700;display:inline-block}
    .badge-open{background:#2a1a0a;color:#fb923c;font-size:12px;padding:4px 12px;border-radius:20px;font-weight:700;display:inline-block}
    .warn-badge{background:#2a1a0a;border:1px solid #92400e;border-radius:10px;padding:8px 12px;font-size:13px;color:#fb923c;display:flex;align-items:center;gap:8px;margin-top:10px}
    .alert-err{background:#1a0505;border:1px solid #7f1d1d;border-radius:12px;padding:12px 16px;font-size:14px;color:#fca5a5;margin-bottom:14px}
    .alert-ok{background:#0a1f0f;border:1px solid #14532d;border-radius:12px;padding:12px 16px;font-size:14px;color:#86efac;margin-bottom:14px}
    .kid-card{background:#161616;border:1px solid #2a2a2a;border-radius:18px;padding:18px;margin-bottom:12px;cursor:pointer}
    .erow{padding:14px 0;border-bottom:1px solid #1e1e1e}
    .erow:last-child{border-bottom:none}
    .shop-icon{width:40px;height:40px;border-radius:12px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
    .muted{color:#666}
    .center{text-align:center}
    .hidden{display:none}
    .loading{padding:40px 0;text-align:center;color:#777}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto}
    .pin-btn{padding:20px;font-size:24px;text-align:center;background:#111;border:1px solid #222;border-radius:16px;cursor:pointer;color:#fff;transition:transform .08s ease, background .15s ease, border-color .15s ease, box-shadow .18s ease}
    .pin-btn:active{transform:scale(.95);background:#171717;border-color:#3a3a3a;box-shadow:0 0 0 1px rgba(255,255,255,.04) inset}
    .pin-display{display:flex;gap:12px;justify-content:center;margin:24px 0 22px;transform:translateZ(0)}
    .pin-display.shake{animation:pinShake .36s ease}
    .pin-display.success{animation:pinSuccess .42s ease}
    .pin-char{width:52px;height:62px;border-radius:14px;border:1px solid #333;background:#111;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;transition:transform .14s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease}
    .pin-char.filled{background:#1e1e1e;border-color:#555}
    .pin-char.pop{animation:pinPop .18s ease}
    .pin-char.error{background:#1a0505;border-color:#7f1d1d;box-shadow:0 0 0 1px rgba(252,165,165,.15) inset}
    .pin-char.success{background:#0d2413;border-color:#22c55e;box-shadow:0 0 0 1px rgba(74,222,128,.18) inset,0 0 22px rgba(74,222,128,.08)}
    @keyframes pinPop{0%{transform:scale(.86)}70%{transform:scale(1.08)}100%{transform:scale(1)}}
    @keyframes pinShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
    @keyframes pinSuccess{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
    .section-title{color:#555;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-bottom:12px}
  
    .btn-primary[disabled],.btn-ghost[disabled],.btn-danger[disabled]{opacity:.55;cursor:not-allowed}
    #s-success{background:#0a0a0a;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
    #s-success.active{display:flex}
    .success-circle{width:96px;height:96px;border-radius:50%;background:#14291a;border:3px solid #4ade80;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:popIn .35s cubic-bezier(.175,.885,.32,1.275)}
    @keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
  </style>
</head>
<body>
  <div id="s-loading" class="screen active"><div class="loading">Laden…</div></div>

  <div id="s-home" class="screen">
    <div style="padding-top:8px;margin-bottom:24px">
      <div class="rowb" style="margin-bottom:20px">
        <div>
          <p class="section-title" style="margin-bottom:6px">Kleedgeld</p>
          <p style="font-size:26px;font-weight:800;letter-spacing:-0.5px">Wie ben jij?</p>
        </div>
        <button class="btn-ghost btn-sm" onclick="reloadApp()">↺</button>
      </div>
    </div>

    <div class="card" style="cursor:pointer;margin-bottom:20px" onclick="goParent()">
      <div class="rowb">
        <div class="row" style="gap:16px">
          <img id="pama-home-photo" class="av" src="">
          <div>
            <p style="font-size:18px;font-weight:700">Pa &amp; Ma</p>
            <p class="muted" style="font-size:14px;margin-top:3px">Ouderoverzicht</p>
          </div>
        </div>
        <div class="muted">›</div>
      </div>
    </div>

    <div class="section-title">Kids</div>
    <div id="kid-cards"></div>
  </div>

  <div id="s-pin" class="screen center">
    <div style="text-align:left">
      <button class="back-btn" onclick="showScreen('s-home')">← Terug</button>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:8px">
      <img id="pin-photo" class="av-lg" style="margin-bottom:16px" src="">
      <p style="font-size:20px;font-weight:700" id="pin-title"></p>
      <p class="muted" style="font-size:14px;margin-top:6px" id="pin-sub"></p>
    </div>
    <div class="pin-display">
      <div class="pin-char" id="pc0">_</div><div class="pin-char" id="pc1">_</div><div class="pin-char" id="pc2">_</div><div class="pin-char" id="pc3">_</div>
    </div>
    <div id="pin-err" class="alert-err hidden" style="max-width:320px;margin:0 auto 14px"></div>
    <div class="pin-grid" id="pin-grid"></div>
  </div>

  <div id="s-kid" class="screen">
    <button class="back-btn" onclick="logoutToHome()">← Uitloggen</button>
    <div class="card" style="margin-bottom:20px">
      <div class="rowb" style="margin-bottom:16px">
        <div>
          <p class="muted" style="font-size:13px;margin-bottom:8px">Huidig saldo</p>
          <div id="kid-saldo-display" class="saldo-num"></div>
          <p class="muted" style="font-size:12px;margin-top:6px" id="kid-next-bij"></p>
        </div>
        <img id="kid-photo" class="av-lg" src="">
      </div>
      <div id="kid-warn" class="warn-badge hidden">
        <span>⚠️</span>
        <span id="kid-warn-text"></span>
      </div>
      <div class="row" style="margin-top:14px">
        <div class="metric"><p class="muted" style="font-size:11px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Bijdrage</p><p style="font-size:16px;font-weight:700">€<span id="kid-bijdrage">0</span>/mnd</p></div>
        <div class="metric"><p class="muted" style="font-size:11px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Open</p><p style="font-size:16px;font-weight:700" id="kid-open-count">0</p></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="kidTab('history',this)">Overzicht</button>
      <button class="tab" onclick="kidTab('add',this)">+ Uitgave</button>
    </div>

    <div id="kt-history"><div id="kid-hist-list"></div></div>

    <div id="kt-add" class="hidden">
      <div class="card">
        <div class="fg"><label>Bedrag (€)</label><input type="number" id="a-amount" placeholder="0.00" step="0.01" min="0.01"></div>
        <div class="fg"><label>Omschrijving</label><input type="text" id="a-desc" placeholder="bijv. Nike schoenen"></div>
        <div class="fg"><label>Datum</label><input type="date" id="a-date"></div>
        <div id="a-err" class="alert-err hidden"></div>
        <button class="btn-primary" onclick="submitExpense(this)">Indienen</button>
      </div>
    </div>
  </div>

  <div id="s-edit" class="screen">
    <button class="back-btn" onclick="backFromEdit()">← Terug</button>
    <p style="font-size:20px;font-weight:700;margin-bottom:20px">Uitgave aanpassen</p>
    <div class="card">
      <div class="fg"><label>Bedrag (€)</label><input type="number" id="e-amount" step="0.01" min="0.01"></div>
      <div class="fg"><label>Omschrijving</label><input type="text" id="e-desc"></div>
      <div class="fg"><label>Datum</label><input type="date" id="e-date"></div>
      <div id="e-err" class="alert-err hidden"></div>
      <div class="row">
        <button class="btn-primary" style="flex:1" onclick="saveEdit(this)">Opslaan</button>
        <button class="btn-danger" style="flex:1" onclick="deleteExpense(this)">Verwijderen</button>
      </div>
    </div>
  </div>

  <div id="s-parent" class="screen">
    <div class="rowb" style="margin-bottom:20px;padding-top:8px">
      <div>
        <p class="section-title" style="margin-bottom:6px">Pa &amp; Ma</p>
        <p style="font-size:26px;font-weight:800;letter-spacing:-0.5px">Overzicht</p>
      </div>
      <button class="btn-ghost btn-sm" onclick="logoutToHome()">Uitloggen</button>
    </div>

    <div id="parent-saldi" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:20px"></div>

    <div class="tabs">
      <button class="tab active" onclick="parentTab('pending',this)">Te betalen</button>
      <button class="tab" onclick="parentTab('all',this)">Alles</button>
      <button class="tab" onclick="parentTab('bij',this)">Bijstort</button>
      <button class="tab" onclick="parentTab('settings',this)">⚙</button>
    </div>

    <div id="pt-pending"><div id="pending-list"></div></div>
    <div id="pt-all" class="hidden"><div id="all-list"></div></div>
    <div id="pt-bij" class="hidden"><div id="bij-list"></div></div>

    <div id="pt-settings" class="hidden">
      <div class="card" style="margin-bottom:12px">
        <p style="font-weight:700;margin-bottom:16px;font-size:16px">Maandelijkse bijdragen</p>
        <div id="bijdrage-settings"></div>
        <button class="btn-ghost btn-sm" style="margin-top:6px" onclick="saveMonthlyAmounts(this)">Opslaan</button>
        <div id="bij-ok" class="alert-ok hidden" style="margin-top:10px">Opgeslagen</div>
      </div>

      <div class="card" style="margin-bottom:12px">
        <p style="font-weight:700;margin-bottom:16px;font-size:16px">Pincodes</p>
        <div id="pin-settings"></div>
        <button class="btn-ghost btn-sm" style="margin-top:6px" onclick="savePins(this)">Opslaan</button>
        <div id="pin-ok" class="alert-ok hidden" style="margin-top:10px">Opgeslagen</div>
      </div>

      <div class="card">
        <p style="font-weight:700;margin-bottom:16px;font-size:16px">Budget waarschuwing</p>
        <div class="fg"><label>Drempelwaarde (€)</label><input type="number" id="warn-threshold" min="0" step="5"></div>
        <button class="btn-ghost btn-sm" onclick="saveThreshold(this)">Opslaan</button>
        <div id="threshold-ok" class="alert-ok hidden" style="margin-top:10px">Opgeslagen</div>
      </div>
    </div>
  </div>


  <div id="s-success" class="screen">
    <div class="success-circle">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <p style="font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:10px" id="success-title">Gelukt</p>
    <p style="color:#666;font-size:15px;margin-bottom:8px" id="success-desc"></p>
    <p style="color:#444;font-size:14px;margin-bottom:36px">De app is bijgewerkt.</p>
    <button class="btn-primary" style="max-width:280px" onclick="afterSuccess()">Terug</button>
  </div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxUVB4JrJZuWkJuSWyYS8kiBCpd6i2qhPhFn6BsV-u-iK8aVi1e9cxq7Lof6ck_REmNSQ/exec';

const SHOPS = {
  'zara':{label:'Zara',color:'#111'},'h&m':{label:'H&M',color:'#E50010'},'hm':{label:'H&M',color:'#E50010'},
  'nike':{label:'Nike',color:'#111'},'adidas':{label:'Adidas',color:'#2563eb'},'primark':{label:'Primark',color:'#00529B'},
  'otto':{label:'Otto',color:'#E30613'},'zalando':{label:'Zalando',color:'#fb923c'}
};
const CATS = {
  'schoen|sneaker|trainer|loafer':['👟','Schoenen'],'trui|sweater|hoodie|pullover':['🧥','Trui'],
  'broek|jeans|chino':['👖','Broek'],'shirt|t-shirt|tshirt|top':['👕','Shirt'],'jas|coat|puffer|parka|vest':['🧣','Jas'],
  'jurk|rok|dress':['👗','Jurk/Rok'],'ondergoed|sokken|onderbroek':['🧦','Ondergoed'],'tas|rugzak|backpack':['👜','Tas'],
  'cap|pet|muts':['🧢','Cap']
};

const app = {
  state: null,
  currentKidId: null,
  pinTarget: null,
  pinBuffer: '',
  editId: null,
  editFrom: null,
  locks: {},
  successReturnScreen: 's-home'
};

function detect(desc=''){
  const d = String(desc).toLowerCase();
  let shop=null,icon='🛍️',cat=null;
  for(const [k,v] of Object.entries(SHOPS)){ if(d.includes(k)){ shop=v; break; } }
  for(const [k,v] of Object.entries(CATS)){ if(k.split('|').some(w=>d.includes(w))){ icon=v[0]; cat=v[1]; break; } }
  return {shop,icon,cat};
}
function euro(v){ return Number(v || 0).toFixed(2); }
function todayIso(){ return new Date().toISOString().slice(0,10); }
function nextMonthLabel(){
  const names = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  const n = new Date();
  const next = new Date(n.getFullYear(), n.getMonth()+1, 1);
  return '1 ' + names[next.getMonth()];
}
function getKidById(id){ return (app.state?.kids || []).find(k => String(k.kid_id) === String(id)); }
function getExpensesForKid(kidId){ return (app.state?.expenses || []).filter(e => String(e.kid_id) === String(kidId)); }
function getPhoto(id){
  const kid = getKidById(id);
  if(kid && kid.photo_url) return kid.photo_url;
  if(id === 'parent') return 'https://placehold.co/200x200/png?text=Pa%2FMa';
  return 'https://placehold.co/200x200/png?text=' + encodeURIComponent(kid ? kid.name : 'Kid');
}
function settingValue(key, fallback=''){ const settings = app.state?.settings || {}; return settings[key] ?? fallback; }

function api(action, payload = {}){
  return new Promise((resolve, reject) => {
    const callbackName = 'kgcb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout bij laden van serverresponse'));
    }, 15000);

    function cleanup(){
      clearTimeout(timeout);
      try { delete window[callbackName]; } catch(e) { window[callbackName] = undefined; }
      if(script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = (data) => {
      cleanup();
      if(!data || !data.ok){
        reject(new Error((data && data.error) ? data.error : 'Onbekende fout'));
        return;
      }
      resolve(data);
    };

    const url = API_URL
      + '?action=' + encodeURIComponent(action)
      + '&callback=' + encodeURIComponent(callbackName)
      + '&payload=' + encodeURIComponent(JSON.stringify(payload));

    script.src = url;
    script.onerror = () => {
      cleanup();
      reject(new Error('Apps Script kon niet worden geladen'));
    };
    document.body.appendChild(script);
  });
}

async function loadApp(){
  showScreen('s-loading');
  try{
    const data = await api('load', {});
    app.state = data.data;
    renderAll();
    showScreen('s-home');
  }catch(err){
    document.getElementById('s-loading').innerHTML = '<div class="alert-err">Laden mislukt: ' + escapeHtml(err.message) + '</div>';
  }
}
async function reloadApp(){ await loadApp(); }
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function renderAll(){ renderHome(); if(app.currentKidId) renderKidScreen(); renderParent(); }

function renderHome(){
  document.getElementById('pama-home-photo').src = getPhoto('parent');
  const kids = app.state.kids.filter(k => String(k.active) !== 'false' && String(k.active) !== '0');
  document.getElementById('kid-cards').innerHTML = kids.map(k => `
    <div class="kid-card" onclick="goKid('${escapeAttr(k.kid_id)}')">
      <div class="rowb">
        <div class="row" style="gap:16px">
          <img class="av" src="${escapeAttr(getPhoto(k.kid_id))}">
          <div>
            <p style="font-size:18px;font-weight:700">${escapeHtml(k.name)}</p>
            <p class="muted" style="font-size:14px;margin-top:3px">Bekijk saldo en dien uitgaven in</p>
          </div>
        </div>
        <div class="muted">›</div>
      </div>
    </div>
  `).join('');
}


function setButtonBusy(btn, busy, text){
  if(!btn) return;
  if(busy){
    if(!btn.dataset.originalText) btn.dataset.originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = text || 'Bezig...';
  } else {
    btn.disabled = false;
    if(btn.dataset.originalText) btn.textContent = btn.dataset.originalText;
  }
}
async function withLock(key, fn){
  if(app.locks[key]) return;
  app.locks[key] = true;
  try { return await fn(); } finally { app.locks[key] = false; }
}
function showSuccess(title, desc, returnScreen){
  document.getElementById('success-title').textContent = title || 'Gelukt';
  document.getElementById('success-desc').textContent = desc || '';
  app.successReturnScreen = returnScreen || 's-home';
  showScreen('s-success');
}
function afterSuccess(){
  if(app.successReturnScreen === 's-parent'){
    renderParent();
    showScreen('s-parent');
  } else if(app.successReturnScreen === 's-kid'){
    if(app.currentKidId) renderKidScreen();
    showScreen('s-kid');
  } else {
    showScreen('s-home');
  }
}


function soundClick(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.value = 640;
    g.gain.value = 0.012;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.04);
    o.stop(ctx.currentTime + 0.045);
  }catch(e){}
}
function soundGood(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
    const g = ctx.createGain();
    o1.type = 'sine'; o2.type = 'sine';
    o1.frequency.value = 660; o2.frequency.value = 880;
    g.gain.value = 0.018;
    o1.connect(g); o2.connect(g); g.connect(ctx.destination);
    o1.start(); o2.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.10);
    o1.stop(ctx.currentTime + 0.10); o2.stop(ctx.currentTime + 0.10);
  }catch(e){}
}
function soundError(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(320, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.09);
    g.gain.value = 0.014;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.10);
    o.stop(ctx.currentTime + 0.10);
  }catch(e){}
}
function haptic(pattern=12){
  try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(e){}
}

function updatePinDisplay(){

    const filled = i < app.pinBuffer.length;
    const el = document.getElementById('pc'+i);

    el.textContent = filled ? '•' : '_';
    el.classList.toggle('filled', filled);

function tapPin(key){
  if(key === '⌫'){
    app.pinBuffer = app.pinBuffer.slice(0,-1);
    haptic(10);
    updatePinDisplay();
    return;
  }
  if(key === 'OK'){
    validatePin();
    return;
  }
  if(app.pinBuffer.length >= 4) return;
  app.pinBuffer += key;
  haptic(12);
  soundClick();
  updatePinDisplay();
  if(app.pinBuffer.length === 4){
    setTimeout(validatePin, 120);
  }
}
async function validatePin(){
  if(app.pinBuffer.length !== 4 || !app.pinTarget) return;
  try{
    const data = await api('validatePin', {
      role: app.pinTarget.role,
      kid_id: app.pinTarget.kidId || '',
      pin: app.pinBuffer
    });
    if(data.data.valid){
      haptic(22);
      soundGood();
      animatePinSuccess();
      setTimeout(() => {
        if(app.pinTarget.role === 'parent'){
          showScreen('s-parent');
        } else {
          app.currentKidId = app.pinTarget.kidId;
          renderKidScreen();
          showScreen('s-kid');
        }
        resetPin();
      }, 180);
      return;
    }
    throw new Error('Onjuiste pincode');
  }catch(err){
    const el = document.getElementById('pin-err');
    el.textContent = err.message;
    el.classList.remove('hidden');
    haptic([18,40,18]);
    soundError();
    animatePinError();
    setTimeout(() => {
      app.pinBuffer = '';
      updatePinDisplay();
    }, 260);
  }
}

    const parentNew = document.getElementById('pin-parent-new').value.trim();
    const parentConfirm = document.getElementById('pin-parent-confirm').value.trim();

    if ((parentNew || parentConfirm) && parentNew !== parentConfirm) {
      alert('De twee ouderpincodes zijn niet gelijk.');
      return;
    }
    if (parentNew && !/^\d{4}$/.test(parentNew)) {
      alert('De nieuwe ouderpin moet uit 4 cijfers bestaan.');
      return;
    }

    const kidPins = [];
    for (const k of kids) {
      const p1 = document.getElementById('pin-' + k.kid_id + '-new').value.trim();
      const p2 = document.getElementById('pin-' + k.kid_id + '-confirm').value.trim();
      if ((p1 || p2) && p1 !== p2) {
        alert('De twee pincodes voor ' + k.name + ' zijn niet gelijk.');
        return;
      }
      if (p1 && !/^\d{4}$/.test(p1)) {
        alert('De nieuwe pincode voor ' + k.name + ' moet uit 4 cijfers bestaan.');
        return;
      }
      if (p1) kidPins.push({ kid_id: k.kid_id, pin: p1 });
    }

    if (!parentNew && kidPins.length === 0) {
      alert('Vul minstens één nieuwe pincode in om iets op te slaan.');
      return;
    }

    setButtonBusy(btn, true, 'Opslaan...');
    try{
      const data = await api('savePins', {kid_pins: kidPins, parent_pin: parentNew});
      app.state = data.data;
      renderAll();
      document.getElementById('pin-ok').classList.remove('hidden');
      setButtonBusy(btn, false);
    }catch(err){ alert(err.message); setButtonBusy(btn, false); }
  });
}

async function saveThreshold(btn){
  return withLock('saveThreshold', async () => {
    setButtonBusy(btn, true, 'Opslaan...');
    try{
      const data = await api('saveThreshold', { warning_threshold: Number(document.getElementById('warn-threshold').value || 0) });
      app.state = data.data;
      renderAll();
      document.getElementById('threshold-ok').classList.remove('hidden');
      setButtonBusy(btn, false);
    }catch(err){ alert(err.message); setButtonBusy(btn, false); }
  });
}

function parentTab(tab, btn){
  document.querySelectorAll('#s-parent .tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pt-pending').classList.toggle('hidden', tab !== 'pending');
  document.getElementById('pt-all').classList.toggle('hidden', tab !== 'all');
  document.getElementById('pt-bij').classList.toggle('hidden', tab !== 'bij');
  document.getElementById('pt-settings').classList.toggle('hidden', tab !== 'settings');
}
function logoutToHome(){ app.currentKidId = null; app.editId = null; app.editFrom = null; showScreen('s-home'); }
function escapeHtml(str){ return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(str){ return escapeHtml(str); }


function resetAddExpenseForm(){
  const amountEl = document.getElementById('a-amount');
  const descEl = document.getElementById('a-desc');
  const dateEl = document.getElementById('a-date');
  const errEl = document.getElementById('a-err');
  const submitBtn = document.querySelector('#kt-add .btn-primary');
  if(amountEl) amountEl.value = '';
  if(descEl) descEl.value = '';
  if(dateEl) dateEl.value = todayIso();
  if(errEl) errEl.classList.add('hidden');
  if(submitBtn){
    submitBtn.disabled = false;
    submitBtn.classList.remove('is-busy');
    if(submitBtn.dataset.originalText) submitBtn.textContent = submitBtn.dataset.originalText;
    else submitBtn.textContent = 'Indienen';
  }
}

function switchKidToAddTab(){
  const tabs = document.querySelectorAll('#s-kid .tab');
  tabs.forEach(t => t.classList.remove('active'));
  if(tabs[1]) tabs[1].classList.add('active');
  const hist = document.getElementById('kt-history');
  const add = document.getElementById('kt-add');
  if(hist) hist.classList.add('hidden');
  if(add) add.classList.remove('hidden');
}



function afterConfetti(){
  resetAddExpenseForm();
  renderKidScreen();
  showScreen('s-kid');
  switchKidToAddTab();
}

buildPinGrid();
loadApp();
</script>
